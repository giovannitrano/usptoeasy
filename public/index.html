<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USPTO Trademark Lookup</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0efe9;
  --surface: #ffffff;
  --surface2: #f7f6f2;
  --border: rgba(0,0,0,0.09);
  --border-mid: rgba(0,0,0,0.15);
  --text: #1a1a18;
  --muted: #6b6a65;
  --faint: #a09f98;
  --accent: #1a4fa0;
  --accent-light: #eef2fb;
  --green: #1a7a50;
  --green-light: #e6f4ed;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1rem 5rem;
}

.app { width: 100%; max-width: 660px; }

/* Header */
.header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.75rem; }
.header-icon {
  width: 46px; height: 46px; flex-shrink: 0;
  background: var(--accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.header-icon svg { width: 22px; height: 22px; }
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
.header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* Search */
.search-card {
  background: var(--surface);
  border: 1px solid var(--border-mid);
  border-radius: var(--radius);
  padding: 1.25rem;
  box-shadow: var(--shadow);
  margin-bottom: 1rem;
}
.search-row { display: flex; gap: 8px; }
.input-wrap { flex: 1; position: relative; }
.input-wrap svg {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--faint); pointer-events: none;
}
#tmInput {
  width: 100%; height: 44px; padding: 0 12px 0 36px;
  font-family: "SF Mono", "Fira Code", "Courier New", monospace;
  font-size: 15px; font-weight: 500; letter-spacing: 2px;
  border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
  background: var(--surface2); color: var(--text);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
#tmInput:focus {
  border-color: var(--accent); background: var(--surface);
  box-shadow: 0 0 0 3px rgba(26,79,160,0.12);
}
#tmInput::placeholder { color: var(--faint); letter-spacing: 1px; font-weight: 400; }

.btn {
  height: 44px; padding: 0 20px;
  background: var(--accent); color: white;
  border: none; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  white-space: nowrap; transition: background .15s, transform .1s;
}
.btn:hover { background: #153f85; }
.btn:active { transform: scale(.97); }
.btn svg { width: 15px; height: 15px; }
.btn.loading { opacity: .7; pointer-events: none; }

/* Error */
.err {
  background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
  font-size: 13px; padding: 9px 14px; border-radius: var(--radius-sm);
  margin-bottom: 10px; display: none;
}
.err.show { display: block; }

/* Card */
.card {
  background: var(--surface); border: 1px solid var(--border-mid);
  border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
}

/* Empty state */
.empty { padding: 3rem 1.5rem; text-align: center; color: var(--muted); }
.empty svg { width: 40px; height: 40px; margin: 0 auto 12px; display: block; color: var(--border-mid); }
.empty p { font-size: 14px; }
.empty small { display: block; font-size: 12px; color: var(--faint); margin-top: 4px; }

/* Loading */
.loading { padding: 3rem; text-align: center; color: var(--muted); font-size: 14px; }
.spinner {
  width: 28px; height: 28px; margin: 0 auto 12px;
  border: 2.5px solid var(--border-mid); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Result grid */
.result-grid { display: grid; grid-template-columns: 150px 1fr; }

.logo-col {
  border-right: 1px solid var(--border); background: var(--surface2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 1.25rem; gap: 8px; min-height: 160px;
}
.logo-col img {
  max-width: 112px; max-height: 112px; object-fit: contain;
  cursor: zoom-in; border-radius: 4px;
  transition: opacity .15s, transform .15s; display: block;
}
.logo-col img:hover { opacity: .85; transform: scale(1.03); }
.zoom-hint { font-size: 10px; color: var(--faint); display: flex; align-items: center; gap: 3px; }
.zoom-hint svg { width: 10px; height: 10px; }
.no-logo {
  width: 78px; height: 78px;
  border: 1px dashed var(--border-mid); border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; color: var(--faint); font-size: 11px; text-align: center;
}
.no-logo svg { width: 22px; height: 22px; }

.info-col { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 10px; }

.tm-name {
  font-size: 21px; font-weight: 700; letter-spacing: -.02em;
  line-height: 1.2; word-break: break-word;
}
.tm-name.na { font-size: 14px; font-weight: 400; color: var(--faint); font-style: italic; }

.sn-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--accent-light); color: var(--accent);
  font-size: 11px; font-weight: 600; font-family: "SF Mono", monospace;
  padding: 3px 10px; border-radius: 20px; letter-spacing: .5px; width: fit-content;
}

.divider { height: 1px; background: var(--border); }

.field { display: flex; flex-direction: column; gap: 3px; }
.field-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; color: var(--faint);
}
.field-value { font-size: 13px; color: var(--text); line-height: 1.65; white-space: pre-line; word-break: break-word; }
.field-value.na { color: var(--faint); font-style: italic; font-size: 12px; }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; width: fit-content;
  background: var(--green-light); color: var(--green);
}

.meta-row { display: flex; flex-wrap: wrap; gap: 14px; }
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--faint); }
.meta-val { font-size: 12px; color: var(--muted); }

/* Links */
.links-bar {
  border-top: 1px solid var(--border); background: var(--surface2);
  padding: 10px 1.25rem;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.links-label { font-size: 11px; color: var(--faint); }
.ext-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500; color: var(--accent);
  text-decoration: none; padding: 5px 12px;
  border: 1px solid rgba(26,79,160,.2); border-radius: 20px;
  background: var(--accent-light); transition: background .12s, border-color .12s;
}
.ext-link:hover { background: #dce8f7; border-color: rgba(26,79,160,.4); }
.ext-link svg { width: 11px; height: 11px; }

/* Zoom overlay */
.zoom-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.78);
  backdrop-filter: blur(5px);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; cursor: zoom-out;
}
.zoom-overlay.open { display: flex; }
.zoom-box {
  background: white; border-radius: var(--radius); padding: 1.5rem;
  max-width: 88vw; max-height: 88vh;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  cursor: default;
}
.zoom-box img { max-width: 68vw; max-height: 68vh; object-fit: contain; }
.zoom-box small { font-size: 11px; color: var(--faint); }

@media (max-width: 480px) {
  .result-grid { grid-template-columns: 1fr; }
  .logo-col { border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; justify-content: flex-start; padding: 1rem; }
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zm0 4l5 2.2V11c0 3.5-2.3 6.8-5 8-2.7-1.2-5-4.5-5-8V7.2L12 5z"/>
        <path d="M10.5 13.5l-2-2-1 1 3 3 5-5-1-1z"/>
      </svg>
    </div>
    <div>
      <h1>USPTO Trademark Lookup</h1>
      <p>Search US trademark records by serial number</p>
    </div>
  </div>

  <div class="search-card">
    <div class="search-row">
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input id="tmInput" type="text" placeholder="e.g. 99829370"
          maxlength="10" inputmode="numeric" autocomplete="off" spellcheck="false"/>
      </div>
      <button class="btn" id="searchBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Search
      </button>
    </div>
  </div>

  <div class="err" id="errBar"></div>

  <div class="card" id="card">
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <p>Enter a trademark serial number to look up</p>
      <small>8-digit US application serial number</small>
    </div>
  </div>

</div>

<div class="zoom-overlay" id="zoom">
  <div class="zoom-box" id="zoomBox">
    <img id="zoomImg" src="" alt="Trademark logo enlarged"/>
    <small>Click outside or press Esc to close</small>
  </div>
</div>

<script>
const $  = id => document.getElementById(id);
const input = $('tmInput'), btn = $('searchBtn'),
      card  = $('card'),    err = $('errBar'),
      zoom  = $('zoom'),    zoomImg = $('zoomImg');

const ESC = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const isValid = s => /^\d{7,10}$/.test(s.trim());

function showErr(msg, ms = 5000) {
  err.textContent = msg; err.classList.add('show');
  clearTimeout(showErr._t);
  showErr._t = setTimeout(() => err.classList.remove('show'), ms);
}

// Digits only
input.addEventListener('input', () => {
  input.value = input.value.replace(/\D/g,'').slice(0,10);
});
input.addEventListener('keydown', e => { if (e.key==='Enter') go(); });
btn.addEventListener('click', go);

function go() {
  const v = input.value.trim();
  if (!isValid(v)) { showErr('Please enter a 7–10 digit trademark serial number.'); return; }
  search(v);
}

function setLoading(on) {
  btn.classList.toggle('loading', on);
  btn.innerHTML = on
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .7s linear infinite"><path d="M12 2a10 10 0 0 1 10 10"/></svg> Searching…`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Search`;
}

function checkImg(url) {
  return new Promise(res => {
    const i = new Image();
    i.onload = () => res(true); i.onerror = () => res(false); i.src = url;
  });
}

async function search(num) {
  err.classList.remove('show');
  setLoading(true);
  card.innerHTML = `<div class="loading"><div class="spinner"></div>Looking up trademark…</div>`;

  let data;
  try {
    const resp = await fetch(`/api/trademark?num=${encodeURIComponent(num)}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
    if (data.error) throw new Error(data.error);
  } catch(e) {
    setLoading(false);
    showErr('Could not fetch data. Try again or use the direct USPTO links below.');
    renderFallback(num);
    return;
  }

  const logoOk = await checkImg(data.logoUrl);
  setLoading(false);
  render(data, logoOk);
}

const LINK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

function linksBar(tsdr, tms) {
  return `<div class="links-bar">
    <span class="links-label">View on USPTO:</span>
    <a href="${ESC(tsdr)}" class="ext-link" target="_blank" rel="noopener">${LINK_SVG} TSDR Status</a>
    <a href="${ESC(tms)}"  class="ext-link" target="_blank" rel="noopener">${LINK_SVG} TM Search</a>
  </div>`;
}

function render(d, logoOk) {
  const { number, tmName, ownerInfo, filingDate, regDate, statusDesc, logoUrl, tsdrUrl, tmsearchUrl } = d;

  const logoHtml = logoOk
    ? `<img src="${ESC(logoUrl)}" alt="Trademark logo" id="logoThumb"/>
       <div class="zoom-hint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M11 8v3m0 3h.01"/></svg>tap to zoom</div>`
    : `<div class="no-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2 1.586-1.586a2 2 0 012.828 0L20 20M14 8h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>No logo</div>`;

  const nameHtml = tmName
    ? `<div class="tm-name" id="tmNameEl" title="Click to copy" style="cursor:pointer">${ESC(tmName)}</div>`
    : `<div class="tm-name na">Name not available — view on USPTO</div>`;

  const cleanOwner = ownerInfo
    ? ownerInfo
        .replace(/Owner Name:\s*/gi, '')
        .replace(/Owner Address:\s*/gi, '')
        .replace(/Legal Entity Type:\s*/gi, '')
        .replace(/Citizenship:\s*/gi, '')
        .split('\n').map(s => s.trim()).filter(Boolean).join('\n')
    : null;

  const ownerHtml = cleanOwner
    ? `<div class="field"><div class="field-label">Owner / Applicant</div><div class="field-value">${ESC(cleanOwner)}</div></div>`
    : `<div class="field"><div class="field-label">Owner / Applicant</div><div class="field-value na">Not available — see USPTO record</div></div>`;

  const statusHtml = statusDesc
    ? `<div class="status-badge">${ESC(statusDesc.slice(0,80))}</div>` : '';

  const metas = [];
  if (filingDate) metas.push(`<div class="meta-item"><div class="meta-lbl">Filed</div><div class="meta-val">${ESC(filingDate)}</div></div>`);
  if (regDate)    metas.push(`<div class="meta-item"><div class="meta-lbl">Registered</div><div class="meta-val">${ESC(regDate)}</div></div>`);
  const metaHtml = metas.length ? `<div class="meta-row">${metas.join('')}</div>` : '';

  card.innerHTML = `
    <div class="result-grid">
      <div class="logo-col">${logoHtml}</div>
      <div class="info-col">
        ${nameHtml}
        <div class="sn-badge">SN&nbsp;${ESC(number)}</div>
        ${statusHtml}
        <div class="divider"></div>
        ${ownerHtml}
        ${metaHtml}
      </div>
    </div>
    ${linksBar(tsdrUrl, tmsearchUrl)}`;

  if (logoOk) {
    const t = document.getElementById('logoThumb');
    if (t) t.addEventListener('click', () => { zoomImg.src = logoUrl; zoom.classList.add('open'); });
  }

  const nameEl = document.getElementById('tmNameEl');
  if (nameEl) {
    nameEl.addEventListener('click', () => {
      navigator.clipboard.writeText(tmName).then(() => {
        const orig = nameEl.title;
        nameEl.title = 'Copied!';
        nameEl.style.opacity = '.6';
        setTimeout(() => { nameEl.title = orig; nameEl.style.opacity = ''; }, 1200);
      });
    });
  }
}

function renderFallback(num) {
  const logoUrl    = `https://tmcms-docs.uspto.gov/cases/${num}/mark/large.png`;
  const tsdrUrl    = `https://tsdr.uspto.gov/#caseNumber=${num}&caseSearchType=US_APPLICATION&caseType=DEFAULT&searchType=statusSearch`;
  const tmsearchUrl= `https://tmsearch.uspto.gov/search/search-results/${num}`;

  card.innerHTML = `
    <div class="result-grid">
      <div class="logo-col">
        <img src="${ESC(logoUrl)}" alt="Logo" id="logoThumb"
          onerror="this.outerHTML='<div class=no-logo>No logo</div>'"/>
        <div class="zoom-hint">tap to zoom</div>
      </div>
      <div class="info-col">
        <div class="tm-name na">Data unavailable — view on USPTO</div>
        <div class="sn-badge">SN&nbsp;${ESC(num)}</div>
        <div class="divider"></div>
        <div class="field-value na">Use the links below to view this record on the official USPTO website.</div>
      </div>
    </div>
    ${linksBar(tsdrUrl, tmsearchUrl)}`;

  const t = document.getElementById('logoThumb');
  if (t) t.addEventListener('click', () => { zoomImg.src = logoUrl; zoom.classList.add('open'); });
}

// Zoom
zoom.addEventListener('click', () => zoom.classList.remove('open'));
$('zoomBox').addEventListener('click', e => e.stopPropagation());
document.addEventListener('keydown', e => { if (e.key==='Escape') zoom.classList.remove('open'); });
</script>
</body>
</html>
